script:
  - id: update_vpd_display
    then:
      - lvgl.label.update:
          id: vpd_value_label
          text: !lambda |-
            static char buf[16];

            if (isnan(id(probe_vpd).state)) {
              snprintf(buf, sizeof(buf), "--.--");
            } else {
              snprintf(buf, sizeof(buf), "%.2f", id(probe_vpd).state);
            }

            return buf;