psram:
  mode: hex
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

display:
  - platform: mipi_dsi
    id: main_display
    model: JC4880P443
    byte_order: little_endian

output:
  - platform: ledc
    pin: GPIO23
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: display_backlight
    name: "${friendly_name} Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

image:
  - file: "assets/atlas_logo.jpg"
    id: atlas_logo
    resize: 420x240
    type: RGB565