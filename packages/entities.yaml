sensor:
  - platform: homeassistant
    id: ha_temp
    entity_id: ${temp_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: temp_value_label
            text:
              format: "%.1f°"
              args: ["x"]

  - platform: homeassistant
    id: ha_humidity
    entity_id: ${humidity_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: humidity_value_label
            text:
              format: "%.1f%%"
              args: ["x"]

  - platform: homeassistant
    id: ha_vpd
    entity_id: ${vpd_entity}
    on_value:
      then:
        - script.execute: update_vpd_display