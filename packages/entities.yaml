sensor:
  - platform: homeassistant
    id: ha_temp
    entity_id: ${temp_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: temp_value_label
            text:
              format: "%.1f°"
              args: ["x"]

  - platform: homeassistant
    id: ha_humidity
    entity_id: ${humidity_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: humidity_value_label
            text:
              format: "%.1f%%"
              args: ["x"]

  - platform: homeassistant
    id: ha_vpd
    entity_id: ${vpd_entity}
    on_value:
      then:
        - script.execute: update_vpd_display

  - platform: homeassistant
    id: ha_vpd_target
    entity_id: ${vpd_target_entity}
    on_value:
      then:
        - script.execute: update_vpd_display

  - platform: homeassistant
    id: ha_fan_pct
    entity_id: ${fan_entity}
    attribute: percentage
    on_value:
      then:
        - lvgl.label.update:
            id: fan_value_label
            text:
              format: "%.0f%%"
              args: ["x"]

text_sensor:
  - platform: homeassistant
    id: ha_vpd_mode
    entity_id: ${vpd_mode_entity}
    on_value:
      then:
        - lvgl.label.update:
            id: current_mode_label
            text: !lambda return x.c_str();
        - script.execute: update_mode_buttons
