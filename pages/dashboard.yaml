lvgl:
  displays:
    - main_display
  rotation: ${display_rotation}
  byte_order: little_endian
  buffer_size: 100%
  disp_bg_color: 0x050B18

  style_definitions:
    - id: card_style
      radius: 24
      bg_color: 0x0A1F4D
      bg_opa: COVER
      border_width: 3
      border_color: 0x4CC8FF
      shadow_width: 14
      shadow_color: 0x2EA8FF
      shadow_opa: 28%
      pad_all: 10

    - id: card_title_style
      text_color: 0xCFEAFF
      text_font: font_title

    - id: card_value_style
      text_color: 0xF2FBFF
      text_font: font_value

    - id: card_subtle_style
      text_color: 0x7FD6FF
      text_font: font_small

  pages:
    - id: main_page
      widgets:
        - obj:
            id: time_card
            x: 6
            y: 10
            width: 468
            height: 128
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 12
                  width: 448
                  text_align: CENTER
                  styles: card_title_style
                  text: "TIME"

              - label:
                  id: time_value_label
                  x: 0
                  y: 50
                  width: 448
                  text_align: CENTER
                  styles: card_value_style
                  text: "--:--"

        - obj:
            id: temp_card
            x: 6
            y: 146
            width: 468
            height: 128
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 10
                  width: 448
                  text_align: CENTER
                  styles: card_title_style
                  text: "TEMPERATURE"

              - label:
                  id: temp_value_label
                  x: 0
                  y: 52
                  width: 448
                  text_align: CENTER
                  styles: card_value_style
                  text: "--.-°F"

        - obj:
            id: humidity_card
            x: 6
            y: 282
            width: 468
            height: 128
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 10
                  width: 448
                  text_align: CENTER
                  styles: card_title_style
                  text: "HUMIDITY"

              - label:
                  id: humidity_value_label
                  x: 0
                  y: 52
                  width: 448
                  text_align: CENTER
                  styles: card_value_style
                  text: "--%"

        - obj:
            id: vpd_card
            x: 6
            y: 418
            width: 468
            height: 128
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 10
                  width: 448
                  text_align: CENTER
                  styles: card_title_style
                  text: "VPD"

              - label:
                  id: vpd_value_label
                  x: 0
                  y: 46
                  width: 448
                  text_align: CENTER
                  styles: card_value_style
                  text: "--.--"

              - label:
                  x: 0
                  y: 92
                  width: 448
                  text_align: CENTER
                  styles: card_subtle_style
                  text: "kPa"

        - obj:
            id: art_card
            x: 6
            y: 554
            width: 468
            height: 238
            styles: card_style
            widgets:
              - image:
                  id: atlas_logo_widget
                  x: 120
                  y: 5
                  src: atlas_logo