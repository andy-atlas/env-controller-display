lvgl:
  rotation: 0
  byte_order: little_endian
  buffer_size: 100%
  disp_bg_color: 0x000000

  style_definitions:
    - id: card_style
      radius: 18
      bg_color: 0x141414
      border_width: 1
      border_color: 0x2E2E2E
      pad_all: 12

  pages:
    - id: main_page
      widgets:
        - obj:
            id: temp_card
            x: 16
            y: 16
            width: 248
            height: 448
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 0
                  width: 224
                  text_align: CENTER
                  text_font: font_title
                  text_color: 0xFFFFFF
                  text: "TEMP"

              - label:
                  id: temp_value_label
                  x: 0
                  y: 180
                  width: 224
                  text_align: CENTER
                  text_font: font_value
                  text_color: 0xFFFFFF
                  text: "--.-°"

        - obj:
            id: humidity_card
            x: 276
            y: 16
            width: 248
            height: 448
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 0
                  width: 224
                  text_align: CENTER
                  text_font: font_title
                  text_color: 0xFFFFFF
                  text: "HUMIDITY"

              - label:
                  id: humidity_value_label
                  x: 0
                  y: 180
                  width: 224
                  text_align: CENTER
                  text_font: font_value
                  text_color: 0xFFFFFF
                  text: "--.-%"

        - obj:
            id: vpd_card
            x: 536
            y: 16
            width: 248
            height: 448
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 0
                  width: 224
                  text_align: CENTER
                  text_font: font_title
                  text_color: 0xFFFFFF
                  text: "VPD"

              - label:
                  id: vpd_value_label
                  x: 0
                  y: 180
                  width: 224
                  text_align: CENTER
                  text_font: font_value
                  text_color: 0xFFFFFF
                  text: "--.--"

              - label:
                  id: vpd_unit_label
                  x: 0
                  y: 290
                  width: 224
                  text_align: CENTER
                  text_font: font_small
                  text_color: 0x9E9E9E
                  text: "kPa"