lvgl:
  displays:
    - main_display
  rotation: ${display_rotation}
  byte_order: little_endian
  buffer_size: 100%
  disp_bg_color: 0x06101E

  style_definitions:
    - id: card_style
      radius: 24
      bg_color: 0x0A2C42
      bg_opa: COVER
      border_width: 3
      border_color: 0xE2C34B
      shadow_width: 10
      shadow_color: 0x29C7FF
      shadow_opa: 20%
      pad_all: 10

    - id: card_title_style
      text_color: 0xE7D17A
      text_font: font_title

    - id: card_value_style
      text_color: 0xF6E7A8
      text_font: font_value

    - id: card_subtle_style
      text_color: 0x7FD6FF
      text_font: font_small

  pages:
    - id: main_page
      widgets:
        - obj:
            id: time_card
            x: 8
            y: 10
            width: 464
            height: 98
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 6
                  width: 440
                  text_align: CENTER
                  styles: card_title_style
                  text: "TIME"

              - label:
                  id: time_value_label
                  x: 0
                  y: 34
                  width: 440
                  text_align: CENTER
                  styles: card_value_style
                  text: "--:--"

        - obj:
            id: temp_card
            x: 8
            y: 120
            width: 464
            height: 126
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 8
                  width: 440
                  text_align: CENTER
                  styles: card_title_style
                  text: "TEMPERATURE"

              - label:
                  id: temp_value_label
                  x: 0
                  y: 50
                  width: 440
                  text_align: CENTER
                  styles: card_value_style
                  text: "--.-°F"

        - obj:
            id: humidity_card
            x: 8
            y: 258
            width: 464
            height: 126
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 8
                  width: 440
                  text_align: CENTER
                  styles: card_title_style
                  text: "HUMIDITY"

              - label:
                  id: humidity_value_label
                  x: 0
                  y: 50
                  width: 440
                  text_align: CENTER
                  styles: card_value_style
                  text: "--%"

        - obj:
            id: vpd_card
            x: 8
            y: 396
            width: 464
            height: 126
            styles: card_style
            widgets:
              - label:
                  x: 0
                  y: 8
                  width: 440
                  text_align: CENTER
                  styles: card_title_style
                  text: "VPD"

              - label:
                  id: vpd_value_label
                  x: 0
                  y: 44
                  width: 440
                  text_align: CENTER
                  styles: card_value_style
                  text: "--.--"

              - label:
                  x: 0
                  y: 90
                  width: 440
                  text_align: CENTER
                  styles: card_subtle_style
                  text: "kPa"

        - obj:
            id: art_card
            x: 8
            y: 536
            width: 464
            height: 256
            styles: card_style
            widgets:
              - image:
                  id: atlas_logo_widget
                  x: 12
                  y: 8
                  src: atlas_logo